<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Banten: Menara & Masjid Agung</title>
  
  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <!-- MindAR untuk A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <!-- A-Frame Look-At Component (untuk anotasi yang selalu menghadap kamera) -->
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

  <!-- Script Gesture untuk Interaksi Sentuh -->
  <script src="assets/js/gesture.js"></script>
  
  <!-- CSS Kustom -->
  <link rel="stylesheet" href="assets/css/style.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <!-- UI Overlay -->
  <div id="ui-container">
    <div class="header-box">
      <h1>AR Jejak Banten</h1>
      <p>Arahkan kamera ke gambar marker Menara atau Masjid.</p>
    </div>
    
    <div class="marker-preview-container">
      <h3>Memuat AR...</h3>
      <p class="note">Izinkan akses kamera dan siapkan gambar target Anda.</p>
    </div>
  </div>
  
  <!-- Info Button -->
  <div id="info-btn" class="info-btn">i</div>

  <!-- Modal Sejarah -->
  <div id="info-modal" class="modal-overlay">
    <div class="modal-content">
      <span class="close-btn" id="close-modal">&times;</span>
      <h2 id="modal-title">Menara Banten</h2>
      <p id="modal-text"></p>
    </div>
  </div>

  <!-- Scene AR -->
  <!-- Menambahkan gesture-detector dan filter OneEuroFilter untuk mengurangi jitter -->
  <a-scene 
    mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false"
    gesture-detector
    id="ar-scene">
    
    <a-assets>
      <!-- Model GLB 3D -->
      <a-asset-item id="glb-bale-budaya" src="assets/models/Bale_Budaya_Pandeglang.glb"></a-asset-item>
      <a-asset-item id="glb-keraton-kaibon" src="assets/models/Keraton_Kaibon.glb"></a-asset-item>
      <a-asset-item id="glb-masjid-agung" src="assets/models/Masjid_Agung_Banten_Lama.glb"></a-asset-item>
      <a-asset-item id="glb-menara-air" src="assets/models/Menara_Air_Pandeglang.glb"></a-asset-item>
      <a-asset-item id="glb-menara-banten" src="assets/models/Menara_Banten_Lama.glb"></a-asset-item>
    </a-assets>

    <!-- Kamera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- TARGET 0: Bale Budaya Pandeglang -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity position="0 0 0" rotation="0 0 0" scale="5 5 5" gesture-handler="minScale: 0.1; maxScale: 50; rotationFactor: 5">
        <a-entity gltf-model="#glb-bale-budaya" position="0 0 0" rotation="0 0 0" scale="1 1 1"></a-entity>
      </a-entity>
    </a-entity>

    <!-- TARGET 1: Kraton Kaibon -->
    <a-entity mindar-image-target="targetIndex: 1">
      <a-entity position="0 0 0" rotation="0 0 0" scale="5 5 5" gesture-handler="minScale: 0.1; maxScale: 50; rotationFactor: 5">
        <a-entity gltf-model="#glb-keraton-kaibon" position="0 0 0" rotation="0 0 0" scale="1 1 1"></a-entity>
      </a-entity>
    </a-entity>

    <!-- TARGET 2: Masjid Agung Banten Lama -->
    <a-entity mindar-image-target="targetIndex: 2">
      <a-entity position="0 0 0" rotation="0 0 0" scale="5 5 5" gesture-handler="minScale: 0.1; maxScale: 50; rotationFactor: 5">
        <a-entity gltf-model="#glb-masjid-agung" position="0 0 0" rotation="0 0 0" scale="1 1 1"></a-entity>
      </a-entity>
    </a-entity>

    <!-- TARGET 3: Menara Air Pandeglang -->
    <a-entity mindar-image-target="targetIndex: 3">
      <a-entity position="0 0 0" rotation="0 0 0" scale="5 5 5" gesture-handler="minScale: 0.1; maxScale: 50; rotationFactor: 5">
        <a-entity gltf-model="#glb-menara-air" position="0 0 0" rotation="0 0 0" scale="1 1 1"></a-entity>
      </a-entity>
    </a-entity>

    <!-- TARGET 4: Menara Banten Lama -->
    <a-entity mindar-image-target="targetIndex: 4">
      <a-entity position="0 0 0" rotation="0 0 0" scale="5 5 5" gesture-handler="minScale: 0.1; maxScale: 50; rotationFactor: 5">
        <a-entity gltf-model="#glb-menara-banten" position="0 0 0" rotation="0 0 0" scale="1 1 1"></a-entity>
      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    
    // Teks Sejarah
    const textData = {
      "Bale Budaya Pandeglang": "Bale Budaya Pandeglang merupakan pusat kegiatan seni dan budaya masyarakat Pandeglang. Tempat ini menjadi saksi berbagai pertunjukan tradisional dan pelestarian kesenian lokal khas Banten.",
      "Kraton Kaibon": "Keraton Kaibon adalah bekas istana tempat tinggal ibunda Sultan Syafiuddin, Ratu Aisyah. Meskipun kini hanya berupa reruntuhan, gerbang dan struktur yang tersisa menunjukkan keindahan arsitektur perpaduan gaya tradisional dan Eropa pada masanya.",
      "Masjid Agung Banten": "Masjid Agung Banten dibangun pertama kali pada masa pemerintahan Sultan Maulana Hasanuddin (putra Sunan Gunung Jati) pada abad ke-16. Masjid ini memiliki atap tumpuk lima berbentuk limas yang diadaptasi dari gaya bangunan Meru pada era Hindu-Buddha.",
      "Menara Air Pandeglang": "Menara Air Pandeglang adalah ikon bersejarah peninggalan kolonial Belanda yang dibangun untuk memenuhi kebutuhan air bersih masyarakat pada masanya. Arsitekturnya khas bangunan fungsional Eropa awal abad ke-20.",
      "Menara Banten": "Menara Banten adalah saksi bisu kejayaan Kesultanan Banten. Menara berbentuk segi delapan (oktagonal) ini menjulang tegak setinggi 24 meter di sisi timur masjid, dirancang memadukan bentuk tubuh ala mercusuar Eropa dengan atap kubah bergaya Tiongkok."
    };

    // UI Elements
    const infoBtn = document.getElementById('info-btn');
    const infoModal = document.getElementById('info-modal');
    const closeModal = document.getElementById('close-modal');
    const modalTitle = document.getElementById('modal-title');
    const modalText = document.getElementById('modal-text');

    let currentTarget = null;

    sceneEl.addEventListener("arReady", (event) => {
      document.querySelector('.marker-preview-container').style.display = 'none';
      console.log("MindAR siap");
    });

    const targets = [
      { index: 0, name: "Bale Budaya Pandeglang" },
      { index: 1, name: "Kraton Kaibon" },
      { index: 2, name: "Masjid Agung Banten" },
      { index: 3, name: "Menara Air Pandeglang" },
      { index: 4, name: "Menara Banten" }
    ];

    targets.forEach(t => {
      const el = document.querySelector(`[mindar-image-target="targetIndex: ${t.index}"]`);
      if(el) {
        el.addEventListener("targetFound", event => {
          currentTarget = t.name;
          infoBtn.style.display = "flex";
        });
        el.addEventListener("targetLost", event => {
          if(currentTarget === t.name) {
            currentTarget = null;
            infoBtn.style.display = "none";
            infoModal.style.display = "none";
          }
        });
      }
    });

    // Modal Interaction
    infoBtn.addEventListener("click", () => {
      if (currentTarget && textData[currentTarget]) {
        modalTitle.innerText = currentTarget;
        modalText.innerText = textData[currentTarget];
        infoModal.style.display = "flex";
      }
    });

    closeModal.addEventListener("click", () => {
      infoModal.style.display = "none";
    });
  </script>
</body>
</html>
