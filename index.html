<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Banten: Menara & Masjid Agung</title>
  
  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <!-- MindAR untuk A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <!-- A-Frame Look-At Component (untuk anotasi yang selalu menghadap kamera) -->
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

  <!-- Script Gesture untuk Interaksi Sentuh -->
  <script src="assets/js/gesture.js"></script>
  
  <!-- CSS Kustom -->
  <link rel="stylesheet" href="assets/css/style.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <!-- UI Overlay -->
  <div id="ui-container">
    <div class="header-box">
      <h1>AR Jejak Banten</h1>
      <p>Arahkan kamera ke gambar marker Menara atau Masjid.</p>
    </div>
    
    <div class="marker-preview-container">
      <h3>Memuat AR...</h3>
      <p class="note">Izinkan akses kamera dan siapkan gambar target Anda.</p>
    </div>
  </div>

  <!-- Scene AR -->
  <!-- Menambahkan gesture-detector dan filter OneEuroFilter untuk mengurangi jitter -->
  <a-scene 
    mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false"
    gesture-detector
    id="ar-scene">
    
    <a-assets>
      <!-- Tekstur Atap Merah (Di-generate via AI) -->
      <img id="atap-merah" src="assets/roof.png">
    </a-assets>

    <!-- Kamera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- TARGET 0: MENARA BANTEN -->
    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Container yang bisa diputar & diskala dengan gesture -->
      <a-entity position="0 0 0" rotation="0 0 0" scale="0.3 0.3 0.3" gesture-handler="minScale: 0.1; maxScale: 1.5; rotationFactor: 5">
        
        <!-- Pondasi Berundak (3 Lapis Segi Delapan) -->
        <a-cylinder position="0 0.15 0" radius="1.8" height="0.3" segments-radial="8" color="#d3d3d3" shadow></a-cylinder>
        <a-cylinder position="0 0.45 0" radius="1.6" height="0.3" segments-radial="8" color="#e0e0e0" shadow></a-cylinder>
        <a-cylinder position="0 0.75 0" radius="1.4" height="0.3" segments-radial="8" color="#eeeeee" shadow></a-cylinder>
        
        <!-- Pintu Masuk Bawah -->
        <a-box position="0 1.25 1.4" width="0.6" height="1" depth="0.2" color="#ffffff"></a-box>
        <a-box position="0 1.25 1.5" width="0.4" height="0.8" depth="0.1" color="#1a1a1a"></a-box>
        <!-- Atap Pintu (Segitiga) -->
        <a-cone position="0 1.85 1.45" radius-bottom="0.4" radius-top="0" height="0.3" segments-radial="4" rotation="0 45 0" color="#ffffff"></a-cone>

        <!-- Badan Bawah Menara (Oktagonal) -->
        <a-cylinder position="0 2.5 0" radius="1.2" height="3.5" segments-radial="8" color="#f8f8f8" roughness="0.8" shadow></a-cylinder>
        
        <!-- Jendela Lengkung Tingkat 1 (Hitam) -->
        <a-cylinder position="0 2.0 1.2" radius="0.15" height="0.3" color="#1a1a1a"></a-cylinder>
        <a-sphere position="0 2.15 1.2" radius="0.15" color="#1a1a1a"></a-sphere>
        <a-cylinder position="0 3.2 1.2" radius="0.15" height="0.3" color="#1a1a1a"></a-cylinder>
        <a-sphere position="0 3.35 1.2" radius="0.15" color="#1a1a1a"></a-sphere>
        
        <a-cylinder position="1.2 2.0 0" radius="0.15" height="0.3" color="#1a1a1a" rotation="0 90 0"></a-cylinder>
        <a-sphere position="1.2 2.15 0" radius="0.15" color="#1a1a1a"></a-sphere>
        <a-cylinder position="1.2 3.2 0" radius="0.15" height="0.3" color="#1a1a1a" rotation="0 90 0"></a-cylinder>
        <a-sphere position="1.2 3.35 0" radius="0.15" color="#1a1a1a"></a-sphere>
        
        <a-cylinder position="-1.2 2.0 0" radius="0.15" height="0.3" color="#1a1a1a" rotation="0 90 0"></a-cylinder>
        <a-sphere position="-1.2 2.15 0" radius="0.15" color="#1a1a1a"></a-sphere>
        <a-cylinder position="-1.2 3.2 0" radius="0.15" height="0.3" color="#1a1a1a" rotation="0 90 0"></a-cylinder>
        <a-sphere position="-1.2 3.35 0" radius="0.15" color="#1a1a1a"></a-sphere>

        <!-- Corbel Balkon 1 (Melebar ke Atas) -->
        <a-cone position="0 4.4 0" radius-bottom="1.2" radius-top="1.6" height="0.3" segments-radial="8" color="#f8f8f8"></a-cone>
        <!-- Lantai Balkon 1 -->
        <a-cylinder position="0 4.6 0" radius="1.7" height="0.1" segments-radial="8" color="#cccccc"></a-cylinder>
        
        <!-- Pagar Balkon 1 (Putih dengan pola) -->
        <a-cylinder position="0 4.8 0" radius="1.65" height="0.4" segments-radial="8" color="#ffffff" opacity="0.8" wireframe="true"></a-cylinder>
        <!-- Tembok Pagar Atas Balkon 1 -->
        <a-torus position="0 5.0 0" radius="1.65" radius-tubular="0.04" color="#ffffff" segments-tubular="8"></a-torus>

        <!-- Badan Atas Menara -->
        <a-cylinder position="0 5.6 0" radius="1.0" height="1.8" segments-radial="8" color="#f8f8f8" roughness="0.8" shadow></a-cylinder>
        
        <!-- Pintu Atas (Ke Balkon 1) -->
        <a-box position="0 5.0 1.0" width="0.4" height="0.6" depth="0.1" color="#1a1a1a"></a-box>
        <a-cylinder position="0 5.3 1.0" radius="0.2" height="0.1" rotation="90 0 0" color="#1a1a1a"></a-cylinder>

        <!-- Lantai Balkon 2 -->
        <a-cylinder position="0 6.6 0" radius="1.2" height="0.1" segments-radial="8" color="#cccccc"></a-cylinder>
        <!-- Pagar Balkon 2 -->
        <a-cylinder position="0 6.8 0" radius="1.15" height="0.3" segments-radial="8" color="#ffffff" opacity="0.8" wireframe="true"></a-cylinder>
        <a-torus position="0 6.95 0" radius="1.15" radius-tubular="0.03" color="#ffffff" segments-tubular="8"></a-torus>

        <!-- Kubah Atas (Membulat seperti Bawang) -->
        <a-cylinder position="0 7.2 0" radius="0.8" height="1.2" color="#f8f8f8"></a-cylinder>
        <a-sphere position="0 7.8 0" radius="0.85" color="#ffffff" shadow scale="1 0.8 1"></a-sphere>
        <a-sphere position="0 8.4 0" radius="0.45" color="#ffffff" scale="1 0.9 1"></a-sphere>
        <a-sphere position="0 8.8 0" radius="0.25" color="#ffffff" scale="1 0.9 1"></a-sphere>
        
        <!-- Mustaka (Puncak Besi Runcing) -->
        <a-cone position="0 9.2 0" radius-bottom="0.05" radius-top="0" height="0.6" color="#7a7a7a"></a-cone>

        <!-- === ANOTASI INTERAKTIF === -->
        <a-entity position="3.5 8 0" look-at="[camera]">
          <a-plane color="#1e293b" opacity="0.85" width="4" height="1.2" position="0 0.6 0" border-radius="0.5"></a-plane>
          <a-text value="Kubah Bawang\n(Gaya Tiongkok & Eropa)" color="#ffffff" align="center" width="5" position="0 0.6 0.05"></a-text>
          <a-cylinder position="-2.5 0.6 0" radius="0.02" height="2" rotation="0 0 90" color="#f59e0b"></a-cylinder>
          <a-cone position="-3.5 0.6 0" radius-bottom="0.1" height="0.3" rotation="0 0 90" color="#f59e0b"></a-cone>
        </a-entity>

        <a-entity position="-3.5 4 0" look-at="[camera]">
          <a-plane color="#1e293b" opacity="0.85" width="4" height="1.2" position="0 0.6 0"></a-plane>
          <a-text value="Bentuk Oktagonal\nMenyuarakan Azan" color="#ffffff" align="center" width="5" position="0 0.6 0.05"></a-text>
          <a-cylinder position="2.5 0.6 0" radius="0.02" height="2" rotation="0 0 -90" color="#f59e0b"></a-cylinder>
          <a-cone position="3.5 0.6 0" radius-bottom="0.1" height="0.3" rotation="0 0 -90" color="#f59e0b"></a-cone>
        </a-entity>
        
        <a-entity position="3.5 1.5 0" look-at="[camera]">
          <a-plane color="#1e293b" opacity="0.85" width="3.5" height="1" position="0 0.5 0"></a-plane>
          <a-text value="Pondasi Tumpuk\nKokoh" color="#ffffff" align="center" width="4" position="0 0.5 0.05"></a-text>
          <a-cylinder position="-2.2 0.5 0" radius="0.02" height="1.5" rotation="0 0 90" color="#f59e0b"></a-cylinder>
        </a-entity>

      </a-entity>
    </a-entity>


    <!-- TARGET 1: MASJID AGUNG BANTEN -->
    <a-entity mindar-image-target="targetIndex: 1">
      <a-entity position="0 0 0" rotation="0 0 0" scale="0.3 0.3 0.3" gesture-handler="minScale: 0.1; maxScale: 1.5; rotationFactor: 5">
        
        <!-- Pondasi Masjid -->
        <a-box position="0 0.2 0" width="6.4" height="0.4" depth="6.4" color="#d3d3d3"></a-box>

        <!-- Bangunan Utama (Dinding Putih) -->
        <a-box position="0 1.2 0" width="5.8" height="1.6" depth="5.8" color="#f5f5f5" shadow></a-box>
        
        <!-- Serambi Depan (Pawestren / Pendopo) -->
        <a-box position="0 0.6 3.4" width="3" height="0.4" depth="1.2" color="#e0e0e0"></a-box>
        <!-- Pilar Serambi Depan -->
        <a-cylinder position="1.3 1.4 3.8" radius="0.1" height="1.2" color="#ffffff"></a-cylinder>
        <a-cylinder position="-1.3 1.4 3.8" radius="0.1" height="1.2" color="#ffffff"></a-cylinder>
        <a-cylinder position="0.5 1.4 3.8" radius="0.1" height="1.2" color="#ffffff"></a-cylinder>
        <a-cylinder position="-0.5 1.4 3.8" radius="0.1" height="1.2" color="#ffffff"></a-cylinder>
        <!-- Atap Serambi Depan -->
        <a-cone position="0 2.2 3.4" radius-bottom="2" radius-top="0" height="0.8" segments-radial="4" rotation="0 45 0" src="#atap-merah" repeat="2 1"></a-cone>

        <!-- Atap Tumpuk 5 (Menggunakan Tekstur Genteng Merah) -->
        <!-- Tumpuk 1 (Terbawah - Paling Lebar) -->
        <a-cone position="0 2.4 0" radius-bottom="4.2" radius-top="3.0" height="1.2" segments-radial="4" rotation="0 45 0" src="#atap-merah" repeat="6 2"></a-cone>
        
        <!-- Tembok Antar Tumpuk 1 & 2 -->
        <a-box position="0 3.2 0" width="4.0" height="0.6" depth="4.0" color="#ffffff"></a-box>
        
        <!-- Tumpuk 2 -->
        <a-cone position="0 3.8 0" radius-bottom="3.2" radius-top="2.2" height="1.0" segments-radial="4" rotation="0 45 0" src="#atap-merah" repeat="4 2"></a-cone>
        
        <!-- Tembok Antar Tumpuk 2 & 3 -->
        <a-box position="0 4.5 0" width="2.8" height="0.5" depth="2.8" color="#ffffff"></a-box>
        
        <!-- Tumpuk 3 -->
        <a-cone position="0 5.0 0" radius-bottom="2.3" radius-top="1.5" height="0.8" segments-radial="4" rotation="0 45 0" src="#atap-merah" repeat="3 1"></a-cone>
        
        <!-- Tumpuk 4 -->
        <a-cone position="0 5.6 0" radius-bottom="1.6" radius-top="0.8" height="0.6" segments-radial="4" rotation="0 45 0" src="#atap-merah" repeat="2 1"></a-cone>
        
        <!-- Tumpuk 5 (Teratas - Menutup) -->
        <a-cone position="0 6.1 0" radius-bottom="0.9" radius-top="0" height="0.6" segments-radial="4" rotation="0 45 0" src="#atap-merah" repeat="1 1"></a-cone>
        
        <!-- Mahkota Atap (Memolo / Mustaka Masjid) -->
        <a-cylinder position="0 6.5 0" radius="0.1" height="0.4" color="#8b0000"></a-cylinder>
        <a-sphere position="0 6.7 0" radius="0.15" color="#8b0000"></a-sphere>

        <!-- === ANOTASI INTERAKTIF === -->
        
        <a-entity position="5.5 4.5 0" look-at="[camera]">
          <a-plane color="#1e293b" opacity="0.85" width="4" height="1.2" position="0 0.6 0"></a-plane>
          <a-text value="Atap Tumpuk Lima\n(Gaya Meru/Pilu)" color="#ffffff" align="center" width="5" position="0 0.6 0.05"></a-text>
          <a-cylinder position="-2.5 0.6 0" radius="0.02" height="2" rotation="0 0 90" color="#f59e0b"></a-cylinder>
          <a-cone position="-3.5 0.6 0" radius-bottom="0.1" height="0.3" rotation="0 0 90" color="#f59e0b"></a-cone>
        </a-entity>

        <a-entity position="-5.5 1.5 0" look-at="[camera]">
          <a-plane color="#1e293b" opacity="0.85" width="4" height="1.2" position="0 0.6 0"></a-plane>
          <a-text value="Ruang Utama\n(Gaya Jawa & Kolonial)" color="#ffffff" align="center" width="5" position="0 0.6 0.05"></a-text>
          <a-cylinder position="2.5 0.6 0" radius="0.02" height="2" rotation="0 0 -90" color="#f59e0b"></a-cylinder>
          <a-cone position="3.5 0.6 0" radius-bottom="0.1" height="0.3" rotation="0 0 -90" color="#f59e0b"></a-cone>
        </a-entity>

      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    sceneEl.addEventListener("arReady", (event) => {
      document.querySelector('.marker-preview-container').style.display = 'none';
      console.log("MindAR siap");
    });
  </script>
</body>
</html>
