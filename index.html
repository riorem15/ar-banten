<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Banten: Menara & Masjid Agung</title>
  
  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <!-- MindAR untuk A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <!-- A-Frame Look-At Component (untuk anotasi yang selalu menghadap kamera) -->
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  
  <!-- CSS Kustom -->
  <link rel="stylesheet" href="assets/css/style.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <!-- UI Overlay -->
  <div id="ui-container">
    <div class="header-box">
      <h1>AR Jejak Banten</h1>
      <p>Arahkan kamera ke gambar marker Menara atau Masjid.</p>
    </div>
    
    <div class="marker-preview-container">
      <h3>Memuat AR...</h3>
      <p class="note">Izinkan akses kamera dan siapkan gambar target Anda.</p>
    </div>
  </div>

  <!-- Scene AR -->
  <a-scene 
    mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: true; uiScanning: no;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false"
    id="ar-scene">
    
    <a-assets>
      <!-- Tekstur Atap Merah (Di-generate via AI) -->
      <img id="atap-merah" src="assets/roof.png">
    </a-assets>

    <!-- Kamera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- TARGET 0: MENARA BANTEN -->
    <!-- Putaran (rotation) 90 0 0 digunakan agar model 'berdiri' ke atas jika marker diletakkan di atas meja -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity position="0 0 0" rotation="90 0 0" scale="0.3 0.3 0.3">
        
        <!-- Menara Base (Oktagonal/Segi Delapan, Putih) -->
        <a-cylinder position="0 0.5 0" radius="1.3" height="1" segments-radial="8" color="#f5f5f5" shadow></a-cylinder>
        
        <!-- Menara Body (Oktagonal) -->
        <a-cylinder position="0 2 0" radius="1.0" height="2" segments-radial="8" color="#ffffff" shadow></a-cylinder>
        
        <!-- Balcony 1 -->
        <a-cylinder position="0 3 0" radius="1.4" height="0.1" color="#e0e0e0"></a-cylinder>
        <!-- Railing 1 (Besi merah) -->
        <a-torus position="0 3.2 0" radius="1.3" radius-tubular="0.03" color="#8b0000"></a-torus>
        <a-cylinder position="0 3.1 1.3" radius="0.02" height="0.2" color="#8b0000"></a-cylinder>
        <a-cylinder position="0 3.1 -1.3" radius="0.02" height="0.2" color="#8b0000"></a-cylinder>
        <a-cylinder position="1.3 3.1 0" radius="0.02" height="0.2" color="#8b0000"></a-cylinder>
        <a-cylinder position="-1.3 3.1 0" radius="0.02" height="0.2" color="#8b0000"></a-cylinder>
        
        <!-- Menara Upper Body -->
        <a-cylinder position="0 3.6 0" radius="0.8" height="1.2" segments-radial="8" color="#ffffff" shadow></a-cylinder>
        
        <!-- Balcony 2 -->
        <a-cylinder position="0 4.2 0" radius="1.1" height="0.1" color="#e0e0e0"></a-cylinder>
        <!-- Railing 2 (Besi merah) -->
        <a-torus position="0 4.4 0" radius="1.0" radius-tubular="0.03" color="#8b0000"></a-torus>
        
        <!-- Dome Top (Kubah Putih gaya tumpuk) -->
        <a-sphere position="0 4.8 0" radius="0.8" color="#ffffff" shadow></a-sphere>
        <a-sphere position="0 5.4 0" radius="0.4" color="#ffffff"></a-sphere>
        
        <!-- Top Ornament (Mustaka) -->
        <a-cone position="0 5.9 0" radius-bottom="0.2" radius-top="0" height="0.5" color="#8b0000"></a-cone>

        <!-- === ANOTASI INTERAKTIF (Teks & Panah) === -->
        
        <!-- Anotasi 1: Atap Kubah -->
        <a-entity position="3 5 0" look-at="[camera]">
          <!-- Kotak Background Teks -->
          <a-plane color="#000000" opacity="0.6" width="3.5" height="1" position="0 0.5 0" border-radius="0.5"></a-plane>
          <a-text value="Atap Kubah\nBerundak" color="#ffffff" align="center" width="5" position="0 0.5 0.1"></a-text>
          <!-- Garis Penunjuk (Panah) -->
          <a-cylinder position="-2.2 0.5 0" radius="0.03" height="2" rotation="0 0 90" color="#fcd303"></a-cylinder>
          <a-cone position="-3.2 0.5 0" radius-bottom="0.1" height="0.3" rotation="0 0 90" color="#fcd303"></a-cone>
        </a-entity>

        <!-- Anotasi 2: Badan Oktagonal -->
        <a-entity position="-3.5 2 0" look-at="[camera]">
          <a-plane color="#000000" opacity="0.6" width="3.5" height="1" position="0 0.5 0"></a-plane>
          <a-text value="Badan Oktagonal\n(Segi Delapan)" color="#ffffff" align="center" width="5" position="0 0.5 0.1"></a-text>
          <!-- Garis Penunjuk -->
          <a-cylinder position="2.2 0.5 0" radius="0.03" height="2" rotation="0 0 -90" color="#fcd303"></a-cylinder>
          <a-cone position="3.2 0.5 0" radius-bottom="0.1" height="0.3" rotation="0 0 -90" color="#fcd303"></a-cone>
        </a-entity>

      </a-entity>
    </a-entity>


    <!-- TARGET 1: MASJID AGUNG BANTEN -->
    <a-entity mindar-image-target="targetIndex: 1">
      <a-entity position="0 0 0" rotation="90 0 0" scale="0.3 0.3 0.3">
        
        <!-- Bangunan Utama (Dinding Putih) -->
        <a-box position="0 0.5 0" width="5" height="1.5" depth="5" color="#ffffff" shadow></a-box>
        <!-- Serambi Pintu -->
        <a-box position="0 0.5 2.5" width="2" height="1" depth="0.5" color="#eeeeee"></a-box>
        <a-box position="0 0.5 2.76" width="1" height="0.8" depth="0.05" color="#2c1b18"></a-box>

        <!-- Atap Tumpuk 5 (Menggunakan Tekstur Genteng Merah) -->
        <!-- Tumpuk 1 (Terbawah) -->
        <a-cone position="0 1.5 0" radius-bottom="3.5" radius-top="2.6" height="0.8" segments-radial="4" rotation="0 45 0" src="#atap-merah" repeat="4 1"></a-cone>
        <!-- Tumpuk 2 -->
        <a-cone position="0 2.2 0" radius-bottom="2.8" radius-top="2.0" height="0.7" segments-radial="4" rotation="0 45 0" src="#atap-merah" repeat="3 1"></a-cone>
        <!-- Tumpuk 3 -->
        <a-cone position="0 2.8 0" radius-bottom="2.2" radius-top="1.5" height="0.6" segments-radial="4" rotation="0 45 0" src="#atap-merah" repeat="2 1"></a-cone>
        <!-- Tumpuk 4 -->
        <a-cone position="0 3.3 0" radius-bottom="1.6" radius-top="1.0" height="0.5" segments-radial="4" rotation="0 45 0" src="#atap-merah" repeat="1.5 1"></a-cone>
        <!-- Tumpuk 5 (Teratas) -->
        <a-cone position="0 3.8 0" radius-bottom="1.1" radius-top="0" height="0.6" segments-radial="4" rotation="0 45 0" src="#atap-merah" repeat="1 1"></a-cone>
        
        <!-- Mahkota Atap (Memolo) -->
        <a-cylinder position="0 4.2 0" radius="0.1" height="0.4" color="#8b0000"></a-cylinder>

        <!-- === ANOTASI INTERAKTIF === -->
        
        <!-- Anotasi 1: Atap Tumpuk Lima -->
        <a-entity position="4.5 3 0" look-at="[camera]">
          <a-plane color="#000000" opacity="0.6" width="3.8" height="1" position="0 0.5 0"></a-plane>
          <a-text value="Atap Tumpuk Lima\n(Gaya Akulturasi)" color="#ffffff" align="center" width="5" position="0 0.5 0.1"></a-text>
          <!-- Garis Penunjuk -->
          <a-cylinder position="-2.5 0.5 0" radius="0.03" height="2" rotation="0 0 90" color="#fcd303"></a-cylinder>
          <a-cone position="-3.5 0.5 0" radius-bottom="0.1" height="0.3" rotation="0 0 90" color="#fcd303"></a-cone>
        </a-entity>

        <!-- Anotasi 2: Bangunan Utama -->
        <a-entity position="-4.5 0.5 0" look-at="[camera]">
          <a-plane color="#000000" opacity="0.6" width="3" height="1" position="0 0.5 0"></a-plane>
          <a-text value="Ruang Utama\nMasjid" color="#ffffff" align="center" width="5" position="0 0.5 0.1"></a-text>
          <!-- Garis Penunjuk -->
          <a-cylinder position="2.0 0.5 0" radius="0.03" height="1.5" rotation="0 0 -90" color="#fcd303"></a-cylinder>
          <a-cone position="2.7 0.5 0" radius-bottom="0.1" height="0.3" rotation="0 0 -90" color="#fcd303"></a-cone>
        </a-entity>

      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    const sceneEl = document.querySelector('a-scene');
    sceneEl.addEventListener("arReady", (event) => {
      document.querySelector('.marker-preview-container').style.display = 'none';
      console.log("MindAR siap");
    });
  </script>
</body>
</html>
