<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kompilasi Marker Otomatis</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <style>
    body { font-family: 'Poppins', Arial, sans-serif; padding: 20px; text-align: center; background: #f8fafc;}
    #status { font-size: 24px; margin-top: 20px; font-weight: bold; color: #334155;}
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; display: none; margin: 20px auto; background-color: #10b981; color: white; border: none; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);}
    button:hover { background-color: #059669; }
    .images { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap;}
    img { width: 120px; height: 120px; object-fit: cover; border: 3px solid #cbd5e1; border-radius: 8px;}
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Auto-Compiler AR Marker</h1>
    <p>Script ini akan secara otomatis menggabungkan ke-5 gambar Anda menjadi file <b>targets.mind</b> yang pas dengan kode HTML Anda.</p>
    
    <div class="images">
      <!-- Index 0 -->
      <img id="img0" src="New Publick/Bale Budaya Pandeglang/50.Bale Budaya Sore Hari .jpg" crossorigin="anonymous">
      <!-- Index 1 -->
      <img id="img1" src="New Publick/Kraton Kaibon/Tampak Luar Masjid Kaibon 3.jpeg" crossorigin="anonymous">
      <!-- Index 2 -->
      <img id="img2" src="New Publick/Masjid Agung Banten Lama/Masjid Agung Banten .jpg" crossorigin="anonymous">
      <!-- Index 3 -->
      <img id="img3" src="New Publick/Menara Air Pandeglang/Keseluruhan Menara Air Pandeglang.jpg" crossorigin="anonymous">
      <!-- Index 4 -->
      <img id="img4" src="New Publick/Menara Banten Lama/80e5abdf-fde2-4cb4-9065-a25ace59a2d0.jpg" crossorigin="anonymous">
    </div>

    <div id="status">Memuat script MindAR...</div>
    <button id="downloadBtn">⬇️ Download targets.mind</button>
  </div>

  <script>
    window.onload = async () => {
      const statusEl = document.getElementById('status');
      const downloadBtn = document.getElementById('downloadBtn');
      const images = [];
      
      // Ambil kelima gambar HTML
      for (let i = 0; i <= 4; i++) {
        images.push(document.getElementById('img' + i));
      }

      statusEl.innerText = "Sedang memproses kompilasi gambar (Mohon tunggu 10-30 detik)...";
      
      try {
        // Panggil compiler dari library MindAR
        const compiler = new window.MINDAR.IMAGE.Compiler();
        
        await compiler.compileImageTargets(images, (progress) => {
          statusEl.innerText = "Progress: " + progress.toFixed(2) + "%";
        });

        statusEl.innerText = "Kompilasi Selesai! 🎉 Silakan klik tombol di bawah.";
        statusEl.style.color = "#10b981";
        downloadBtn.style.display = "block";

        const exportedBuffer = await compiler.exportData();
        const blob = new Blob([exportedBuffer]);
        const url = URL.createObjectURL(blob);

        downloadBtn.onclick = () => {
          const a = document.createElement("a");
          document.body.appendChild(a);
          a.style = "display: none";
          a.href = url;
          a.download = "targets.mind";
          a.click();
          window.URL.revokeObjectURL(url);
          a.remove();
        };
      } catch (err) {
        statusEl.innerText = "Terjadi kesalahan: " + err.message + "\n(Pastikan Anda membuka file ini menggunakan Live Server!)";
        statusEl.style.color = "red";
        console.error(err);
      }
    };
  </script>
</body>
</html>
